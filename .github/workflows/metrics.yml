name: Metrics

# Renders GitHub stats to a committed SVG (github-metrics.svg) so the profile
# README never depends on the rate-limited public stats servers.
# Runs daily and on manual trigger. (No push trigger, to avoid commit loops.)
on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          # Personal access token stored as a repo secret (see setup notes).
          token: ${{ secrets.METRICS_TOKEN }}
          user: prakhar-189
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Kolkata

          # Overview card: header + activity + repositories + languages breakdown
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8

          # Isometric contribution calendar (includes current/longest streak),
          # replacing the old streak-stats card.
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
